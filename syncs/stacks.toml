[[stack]]
name = "actual"
deploy = true
tags = ["prod", "um870"]
[stack.config]
server = "um870"
git_provider = "github.com"
repo = "kkieslich/homelab"
branch = "main"
run_directory = "stacks/actual"
file_paths = ["docker-compose.yml"]
poll_for_updates = true
auto_update = true
# actual_db_sync is built from this repository and has no remote registry
# digest. Git reconciliation rebuilds it when its source changes.
auto_update_skip_services = ["actual_db_sync"]
# Decrypt the env secret (enc.env -> .env) and the fints banks config
# (banks.toml.enc -> banks.toml) with the host age key just before compose runs.
[stack.config.pre_deploy]
path = ""
shell_mode = true
command = 'K=/var/lib/komodo-periphery/age-key.txt; SOPS_AGE_KEY_FILE=$K sops -d --input-type dotenv --output-type dotenv enc.env > .env && chmod 600 .env && SOPS_AGE_KEY_FILE=$K sops -d --input-type binary --output-type binary banks.toml.enc > banks.toml && chmod 644 banks.toml'

# BeerBot — runs the GHCR images built by github.com/BeerbotApp/BeerBot. Live prod
# data is forward-synced by the in-stack migrator (parallel run). GHCR images are
# private: add a registry account (PAT read:packages) in Komodo, or make public.
[[stack]]
name = "beerbot"
deploy = true
tags = ["prod", "um870"]
[stack.config]
server = "um870"
git_provider = "github.com"
repo = "kkieslich/homelab"
branch = "main"
run_directory = "stacks/beerbot"
file_paths = ["docker-compose.yml"]
# Private GHCR images — Periphery does `docker login ghcr.io` with this account
# (created by the komodo-bootstrap oneshot from /run/secrets/beerbot-ghcr.env).
registry_provider = "ghcr.io"
registry_account = "kkieslich"
# Auto-deploy on new images: Komodo polls GHCR for a new digest on the :latest
# app images (using the registry account above) and redeploys when one appears —
# so a CI push of a new image rolls out on its own, no webhook/CI hook needed.
# Only the services whose image changed are updated (pinned postgres/keycloak/minio
# are untouched). Poll cadence = Core's default KOMODO_POLL_RATE.
poll_for_updates = true
auto_update = true
# Keep stateful data services and their matching init jobs out of unattended
# digest rollouts. Application and identity images still update automatically.
auto_update_skip_services = ["beerbot-db", "beerbot-db-init", "beerbot-minio", "beerbot-minio-init"]
# Successful init/provision jobs are expected to exit and must not make the
# steady-state stack appear unhealthy.
ignore_services = ["beerbot-db-init", "beerbot-keycloak-config", "beerbot-minio-init", "beerbot-provision"]
# Deploy-time secret decryption: decrypt the sops-encrypted enc.env in this repo
# to a gitignored ./.env (which every service reads via env_file) using the host
# age key, just before compose runs. Also decrypt fcm-api.json.enc → ./fcm-api.json
# (the v4 FCM service-account key mounted into beerbot-api for push sends), same as
# the actual stack decrypts banks.toml.enc. sops is on Periphery's PATH and reads its
# private age-key copy (both provisioned by the NixOS komodo module). Komodo runs
# pre_deploy with cwd = run_directory, so enc.env/.env are plain relative paths.
[stack.config.pre_deploy]
path = ""
shell_mode = true
command = 'K=/var/lib/komodo-periphery/age-key.txt; SOPS_AGE_KEY_FILE=$K sops -d --input-type dotenv --output-type dotenv enc.env > .env && chmod 600 .env && SOPS_AGE_KEY_FILE=$K sops -d --input-type binary --output-type binary fcm-api.json.enc > fcm-api.json && chmod 600 fcm-api.json'

# Sendspin player — the official OHF Python player (sendspin-cli), built locally
# from stacks/sendspin/Dockerfile. Connects to the Music Assistant Sendspin
# server (host network, :8927) and plays to the couch PipeWire HDMI sink → Denon.
# Replaces the NixOS sendspin-go service, whose Go client deadlocked during
# playback (blocking channel sends in its websocket read-loop). No image poll
# (local build); no secrets.
[[stack]]
name = "sendspin"
deploy = true
tags = ["prod", "um870"]
[stack.config]
server = "um870"
git_provider = "github.com"
repo = "kkieslich/homelab"
branch = "main"
run_directory = "stacks/sendspin"
file_paths = ["docker-compose.yml"]
