# Komodo procedures, applied by the homelab Resource Sync.
#
# GitHub cannot reach the LAN-only Komodo listener, so reconcile desired state
# internally. RunSync fetches main, applies changed TOML resources, and deploys
# repo-backed stacks declared with `deploy = true` when their desired state is
# newer than the running deployment.
[[procedure]]
name = "GitOps - Reconcile homelab"
description = "Fetches main, applies declarative resources, and deploys stacks whose desired state changed."
tags = ["system", "gitops"]
config.schedule = "every 5 minutes"
config.schedule_enabled = true

[[procedure.config.stage]]
name = "Apply desired state"
enabled = true
executions = [
  { execution.type = "RunSync", execution.params.sync = "homelab", enabled = true },
]

# Komodo's stack change detector compares Compose contents, not auxiliary
# bind-mounted files. Keep proxy refresh separate from RunSync so the sync never
# modifies its own currently running procedure.
[[procedure]]
name = "GitOps - Refresh proxy"
description = "Refreshes the Proxy Git clone so Caddy --watch sees auxiliary Caddyfile changes."
tags = ["system", "gitops"]
config.schedule = "every 5 minutes"
config.schedule_enabled = true

[[procedure.config.stage]]
name = "Deploy proxy idempotently"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "proxy", enabled = true },
]

# Declaring the seeded "Global Auto Update" here makes its 15-minute cadence
# version-controlled. It runs the GlobalAutoUpdate job, which pulls the latest
# image for every registry-backed stack flagged poll_for_updates/auto_update
# and redeploys the services whose digest changed. Stateful BeerBot storage
# services and locally built images are excluded. Without this file Komodo would
# revert to the seeded default (daily at 03:00).
[[procedure]]
name = "Global Auto Update"
description = "Pulls and auto updates Stacks and Deployments using 'poll_for_updates' or 'auto_update'."
tags = ["system"]
config.schedule = "every 15 minutes"
config.schedule_enabled = true

[[procedure.config.stage]]
name = "Stage 1"
enabled = true
executions = [
  { execution.type = "GlobalAutoUpdate", execution.params.skip_auto_update = false, enabled = true },
]

# Dashboard JSON is an auxiliary bind mount and does not participate in
# Komodo's Compose-content change detector. An explicit idempotent deployment
# after Git sync reliably reloads provisioned dashboards.
[[procedure]]
name = "Monitoring - Refresh dashboards"
description = "Manually deploys monitoring after GitOps reconciliation completes so provisioned dashboard and datasource changes become active."
tags = ["system", "gitops", "monitoring"]

[[procedure.config.stage]]
name = "Deploy monitoring idempotently"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "monitoring", enabled = true },
]

[[procedure]]
name = "Actual - Sync UmweltBank now"
description = "Runs the one-shot UmweltBank FinTS fetch/import job. This is intentionally manual to avoid repeated bank logins/SCA prompts."
tags = ["prod", "um870", "actual", "manual"]

[[procedure.config.stage]]
name = "Run UmweltBank import"
enabled = true
executions = [
  { execution.type = "RunStackService", execution.params.stack = "actual", execution.params.service = "fints_sync_umwelt", execution.params.no_tty = true, enabled = true },
]

[[procedure]]
name = "Actual - Sync Baader now"
description = "Restarts the persistent Baader daemon; it fetches immediately unless the last fetch is under 10 minutes old. Attach to its TTY if an SMS TAN is required."
tags = ["prod", "um870", "actual", "manual"]

[[procedure.config.stage]]
name = "Restart Baader daemon"
enabled = true
executions = [
  { execution.type = "RestartStack", execution.params.stack = "actual", execution.params.services = ["fints_daemon_baader"], enabled = true },
]

[[procedure]]
name = "Actual - Audit imports"
description = "Read-only audit of imported IDs, duplicate candidates, legacy IDs, missing payees, and uncategorized transactions. Makes no Actual changes."
tags = ["prod", "um870", "actual", "audit", "read-only"]

[[procedure.config.stage]]
name = "Run read-only import audit"
enabled = true
executions = [
  { execution.type = "RunStackService", execution.params.stack = "actual", execution.params.service = "actual_db_sync", execution.params.command = ["node", "/app/cli/bin/actual.mjs", "audit-imports", "--json"], execution.params.workdir = "/app/cli", execution.params.no_tty = true, execution.params.no_deps = true, enabled = true },
]

[[procedure]]
name = "Actual - Finance health"
description = "Read-only finance-trust, review-queue, and source-freshness report from the analytical SQLite projection. Makes no Actual changes."
tags = ["prod", "um870", "actual", "audit", "read-only"]

[[procedure.config.stage]]
name = "Read finance health"
enabled = true
executions = [
  { execution.type = "RunStackService", execution.params.stack = "actual", execution.params.service = "actual_db_sync", execution.params.command = ["node", "/app/cli/bin/actual.mjs", "finance-health", "--snapshot=/db/actual.sqlite", "--json"], execution.params.workdir = "/app/cli", execution.params.no_tty = true, execution.params.no_deps = true, enabled = true },
]
