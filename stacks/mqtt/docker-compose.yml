name: "mqtt"
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - /persist/appdata/mqtt/config:/mosquitto/config
      - /persist/appdata/mqtt/data:/mosquitto/data
      - /persist/appdata/mqtt/log:/mosquitto/log
