name: "mqtt"
# This repository is the desired state; Komodo reconciles main automatically.
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - config:/mosquitto/config
      - data:/mosquitto/data
      - log:/mosquitto/log

volumes:
  config:
  data:
  log:
