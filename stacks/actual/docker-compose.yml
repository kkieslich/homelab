name: "actual"

# Top-level extension key (recognised by Docker Compose as a non-service).
# Holds the common config for FinTS jobs. NOT a service itself: the `x-` prefix
# tells compose to skip it during `up`.
x-fints-base: &fints-base
  build:
    context: ./fints-actual-bridge
  restart: unless-stopped
  env_file:
    # Decrypted from enc.env by the Komodo pre_deploy step (see syncs/stacks.toml).
    - path: ./.env
      required: false
  environment:
    # bin/import.mjs reads ACTUAL_SERVER_URL; route through the in-network
    # service name to avoid round-tripping through Caddy.
    ACTUAL_SERVER_URL: http://actual_server:5006
    # fints-fetch, fints-daemon, and bin/import.mjs all persist status/state
    # here. actual_db_sync mounts the same named volume at /fints.
    STATE_DIR: /state
  volumes:
    # banks.toml is decrypted from banks.toml.enc by pre_deploy (0644, no owner
    # strictness — read-only config).
    - ./banks.toml:/app/banks.toml:ro
    # Non-secret writer ownership registry used by the guarded importer.
    - ./cli/config/accounts.json:/app/accounts.json:ro
    # State directory (dialog/state/holdings/status files). Shared with
    # actual_db_sync so the SQLite tables auto-update after each fetch.
    - fints-state:/state
  # actual_server is on proxy_net (so Caddy can reach it). The daemons need
  # to be on the same network for `actual_server:5006` to resolve via Docker
  # DNS. Without this, "Authentication failed: network-failure" on signIn.
  networks:
    - proxy_net
  depends_on:
    - actual_server

services:
  actual_server:
    image: actualbudget/actual-server:latest
    container_name: actual_server
    restart: unless-stopped
    ports:
      - "5006:5006"
    volumes:
      - server-data:/data
    networks:
      - proxy_net


  # UmweltBank: manual one-shot import. It starts, asks for/uses SCA as needed,
  # fetches once, imports into Actual, writes /state/fints-status.json, then
  # exits. It is profile-gated so normal deploys never contact UmweltBank.
  #
  # Komodo procedure: "Actual - Sync UmweltBank now"
  # CLI fallback:
  #   docker compose --profile manual run --rm --build fints_sync_umwelt
  fints_sync_umwelt:
    <<: *fints-base
    profiles: ["manual"]
    container_name: fints_sync_umwelt
    restart: "no"
    command:
      - sh
      - -ec
      - |
        fints-fetch --bank umwelt --days 30 --out /state/umwelt-fetch.json
        node bin/import.mjs --bank umwelt --in /state/umwelt-fetch.json --registry /app/accounts.json --manifest-dir /state/import-runs

  # Baader (finanzen.net zero): persistent interactive daemon. Baader offers
  # smsTAN only, so keep the authenticated FinTS dialog alive between hourly
  # imports. Attach to the TTY after start/session expiry to enter the TAN.
  # Holdings fetches and imports remain fail-closed in the bridge.
  #
  # Komodo procedure: "Actual - Sync Baader now"
  # CLI fallback:
  #   docker compose restart fints_daemon_baader
  #   docker attach fints_daemon_baader
  fints_daemon_baader:
    <<: *fints-base
    container_name: fints_daemon_baader
    stdin_open: true
    tty: true
    command:
      - fints-daemon
      - --bank=fnz
      - --out=/state/fnz-fetch.json
      - --fetch-interval=3600
      - --heartbeat-interval=180
      - --days=30
      - --import-after
      - --importer
      - node bin/import.mjs --registry /app/accounts.json --manifest-dir /state/import-runs

  # Mirrors the Actual server's data into a SQLite read-replica every
  # REFRESH_INTERVAL_SEC. Grafana mounts the same volume read-only and runs SQL
  # queries against the snapshot, giving full historical analysis without
  # needing Prometheus (which only stores from when scraping starts).
  actual_db_sync:
    container_name: actual_db_sync
    build:
      context: .
      dockerfile: db-sync/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      # Internal docker network — bypasses Caddy/TLS/hairpin-NAT.
      ACTUAL_SERVER_URL: http://actual_server:5006
      REFRESH_INTERVAL_SEC: 300
    volumes:
      # Read-only fints-status.json + holdings.json so we can populate the
      # pipeline_status and holdings tables.
      - fints-state:/fints:ro
      # Non-secret expected-source cadence configuration.
      - ./cli/config/accounts.json:/config/accounts.json:ro
      # The SQLite read-replica. Shared with Grafana (monitoring stack mounts
      # this same named volume, actual_db, as external:true).
      - db:/db
    networks:
      - proxy_net
    depends_on:
      - actual_server

volumes:
  server-data:
  fints-state:
  # The SQLite read-replica, shared read-only with the monitoring stack, which
  # references it as an external volume named `actual_db`.
  db:

networks:
  proxy_net:
    external: true
