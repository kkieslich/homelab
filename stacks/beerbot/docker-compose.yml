name: "beerbot"

# BeerBot — drink-tracking app. Images are built + pushed to GHCR by the app
# repo's CI (github.com/BeerbotApp/BeerBot); this stack just runs them.
#
# Conventions (see repo README):
#  - Public-facing services are routed by the `proxy` Caddy stack over proxy_net
#    (by service name — no host ports). Routes live in stacks/proxy/Caddyfile.
#  - Runtime secrets live in THIS repo as sops-encrypted `enc.env`. Komodo's
#    pre_deploy step decrypts it to `./.env` (gitignored) with the host age key
#    just before deploy; every service reads it via `env_file: ./.env`. So the
#    repo only ever holds ciphertext and the host owns no beerbot env secret.
#    See enc.env / the ownership-decoupling design; non-secret host-specific
#    config (the *.home.kki.berlin URLs) stays inline below.
#  - Data lives in named Docker volumes (db, minio) — Docker owns them, which
#    also lets postgres chown its own data dir (a host bind mount cannot).
#  - GHCR images are private: the `ghcr.io` registry account (created by
#    komodo-bootstrap) authenticates the pull.
#
# The migrator's old-prod SSH key is the one exception still delivered by
# sops-nix at /run/secrets/beerbot-old-vps: OpenSSH's strict ownership check
# needs it root-owned, which a pre_deploy decrypt (runs as komodo-periphery)
# cannot produce. The migrator is transitional, so this is temporary.

# Shared NON-SECRET MinIO endpoint config. Every backend service that talks to
# MinIO reads these, so they are defined once here and merged into each service's
# environment (via `<<: *minio-env`) — never in the secret. Only MINIO_ROOT_USER/
# PASSWORD (real secrets) live in enc.env.
x-minio-env: &minio-env
  MINIO_ENDPOINT: http://beerbot-minio:9000
  MINIO_PUBLIC_ENDPOINT: https://cdn.beerbot.home.kki.berlin
  MINIO_BUCKET: beerbot

services:
  # --- REST API -------------------------------------------------------------
  beerbot-api:
    image: ghcr.io/beerbotapp/beerbot/api-app:latest
    container_name: beerbot-api
    restart: unless-stopped
    depends_on:
      beerbot-db: { condition: service_healthy }
      beerbot-minio: { condition: service_started }
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: *minio-env
      AUTH_ISSUER: https://auth.beerbot.home.kki.berlin/realms/beerbot
      API_AUDIENCE: beerbot-api
      APP_WEB_ORIGINS: https://beerbot.home.kki.berlin
      MINIO_PRESIGNED_URL_TTL_HOURS: "24"
      # Push notifications OFF: this test instance forward-syncs REAL device tokens
      # from old prod, so it must never send (would ping real users' phones). The
      # API boots fine without the Firebase key (none is mounted here).
      NOTIFICATIONS_ENABLED: "false"
      # POSTGRES_* (DB connection is built from them) and MINIO_ROOT_USER/PASSWORD
      # come from ./.env.
    networks: [proxy_net]

  # --- Admin API (served under admin host at /api, prefix stripped by Caddy) --
  beerbot-admin-api:
    image: ghcr.io/beerbotapp/beerbot/api-admin:latest
    container_name: beerbot-admin-api
    restart: unless-stopped
    depends_on:
      beerbot-db: { condition: service_healthy }
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: *minio-env
      AUTH_ISSUER: https://auth.beerbot.home.kki.berlin/realms/beerbot
      ADMIN_API_AUDIENCE: beerbot-admin-api
      ADMIN_WEB_ORIGINS: https://admin.beerbot.home.kki.berlin
      # POSTGRES_* (DB connection is built from them) come from ./.env.
    networks: [proxy_net]

  # --- Expo web app (runtime config → /env.js on start) ---------------------
  beerbot-web:
    image: ghcr.io/beerbotapp/beerbot/web:latest
    container_name: beerbot-web
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      EXPO_PUBLIC_API_URL: https://api.beerbot.home.kki.berlin
      EXPO_PUBLIC_API_AUDIENCE: beerbot-api
      EXPO_PUBLIC_AUTH_ISSUER: https://auth.beerbot.home.kki.berlin/realms/beerbot
      EXPO_PUBLIC_AUTH_WEB_CLIENT_ID: beerbot-web
      EXPO_PUBLIC_AUTH_MOBILE_CLIENT_ID: beerbot-mobile
    networks: [proxy_net]

  # --- Admin web (Vite SPA; runtime config → /config.js on start) -----------
  beerbot-admin-web:
    image: ghcr.io/beerbotapp/beerbot/admin-web:latest
    container_name: beerbot-admin-web
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      VITE_AUTH_ISSUER: https://auth.beerbot.home.kki.berlin/realms/beerbot
      VITE_AUTH_CLIENT_ID: beerbot-admin
      VITE_ADMIN_API_RESOURCE: beerbot-admin-api
      VITE_ADMIN_API_URL: https://admin.beerbot.home.kki.berlin/api
    networks: [proxy_net]

  # --- Landing page ---------------------------------------------------------
  beerbot-landing:
    image: ghcr.io/beerbotapp/beerbot/landing:latest
    container_name: beerbot-landing
    restart: unless-stopped
    networks: [proxy_net]

  # --- Postgres (beerbot + keycloak DBs; empty on first start) ---------------
  beerbot-db:
    image: postgres:14.1-alpine
    container_name: beerbot-db
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      POSTGRES_USER: beerbot
      POSTGRES_MULTIPLE_DATABASES: beerbot,keycloak
      # POSTGRES_PASSWORD comes from ./.env.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beerbot -d beerbot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks: [proxy_net]

  # --- Keycloak (self-hosted OIDC) ------------------------------------------
  beerbot-keycloak:
    image: ghcr.io/beerbotapp/beerbot/keycloak:latest
    container_name: beerbot-keycloak
    restart: unless-stopped
    depends_on:
      beerbot-db: { condition: service_healthy }
    entrypoint:
      - sh
      - -c
      - |
        export KC_DB_PASSWORD="$$POSTGRES_PASSWORD"
        export KC_BOOTSTRAP_ADMIN_USERNAME="$$KEYCLOAK_ADMIN_USERNAME"
        export KC_BOOTSTRAP_ADMIN_PASSWORD="$$KEYCLOAK_ADMIN_PASSWORD"
        exec /opt/keycloak/bin/kc.sh start --http-enabled=true --http-port=8080 --proxy-headers=xforwarded
    env_file:
      - path: ./.env
        required: false
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://beerbot-db:5432/keycloak
      KC_DB_USERNAME: beerbot
      KC_HOSTNAME: https://auth.beerbot.home.kki.berlin
      KC_HEALTH_ENABLED: "true"
    networks: [proxy_net]

  # --- MinIO (object storage for pictures) ----------------------------------
  beerbot-minio:
    image: minio/minio:latest
    container_name: beerbot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - path: ./.env
        required: false
    volumes:
      - minio:/data
    networks: [proxy_net]

  beerbot-minio-init:
    image: minio/mc:latest
    container_name: beerbot-minio-init
    depends_on:
      beerbot-minio: { condition: service_started }
    env_file:
      - path: ./.env
        required: false
    # $$VAR (escaped) → read from the CONTAINER env (env_file), not compose interpolation.
    # Credentials go through MC_HOST_<alias> (URL userinfo) rather than positional
    # args to `mc alias set`: MINIO_ROOT_PASSWORD can start with '-', which mc would
    # otherwise parse as a CLI flag ("flag provided but not defined"). Looping on the
    # actual `mb` doubles as the readiness wait.
    entrypoint: >
      /bin/sh -c "
      export MC_HOST_local=\"http://$$MINIO_ROOT_USER:$$MINIO_ROOT_PASSWORD@beerbot-minio:9000\";
      until /usr/bin/mc mb --ignore-existing local/beerbot >/dev/null 2>&1; do
        echo 'waiting for minio...' && sleep 1;
      done &&
      echo 'minio ready: bucket beerbot present'
      "
    restart: "no"
    networks: [proxy_net]

  # --- provision (one-shot): schema → head + Keycloak realm, each deploy -----
  beerbot-provision:
    image: ghcr.io/beerbotapp/beerbot/migrator:latest
    container_name: beerbot-provision
    command: ["provision"]
    restart: on-failure:10
    depends_on:
      beerbot-db: { condition: service_healthy }
      beerbot-keycloak: { condition: service_started }
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: *minio-env
      AUTH_ISSUER: https://auth.beerbot.home.kki.berlin/realms/beerbot
      KEYCLOAK_BASE_URL: http://beerbot-keycloak:8080
      KEYCLOAK_REALM: beerbot
      # POSTGRES_*, KEYCLOAK_ADMIN_* come from ./.env.
    networks: [proxy_net]

  # --- migrator (parallel-run): forward-sync LIVE data from old prod ---------
  # Runs `sync --watch 900` continuously (the image's default CMD): every ~15 min
  # it opens the in-service SSH tunnel to old prod and syncs identity → domain →
  # pictures → recompute into the new DB. Starts only after provision succeeds.
  # The old-prod SSH key is delivered by sops-nix at /run/secrets/beerbot-old-vps
  # (root-owned, for OpenSSH's ownership check — see the header note).
  beerbot-migrator:
    image: ghcr.io/beerbotapp/beerbot/migrator:latest
    container_name: beerbot-migrator
    restart: unless-stopped
    depends_on:
      beerbot-provision: { condition: service_completed_successfully }
      beerbot-db: { condition: service_healthy }
      beerbot-minio: { condition: service_started }
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: *minio-env
      AUTH_ISSUER: https://auth.beerbot.home.kki.berlin/realms/beerbot
      KEYCLOAK_BASE_URL: http://beerbot-keycloak:8080
      KEYCLOAK_REALM: beerbot
      # In-container path of the mounted key (matches the volume below).
      MIGRATOR_TUNNEL_KEY_FILE: /keys/old-vps
      # POSTGRES_* (new DB), BEERBOT_LEGACY_CONNECTION (old DB; the auth one is
      # derived from it), MIGRATOR_TUNNEL_TARGET, KEYCLOAK_ADMIN_*,
      # MINIO_ROOT_USER/PASSWORD come from ./.env.
    volumes:
      # sops-nix delivers the old-prod SSH private key here (read-only).
      - /run/secrets/beerbot-old-vps:/keys/old-vps:ro
    networks: [proxy_net]

volumes:
  db:
  minio:

networks:
  proxy_net:
    external: true
